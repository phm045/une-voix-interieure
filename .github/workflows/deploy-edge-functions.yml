name: "🚀 Deploy Supabase Edge Functions"

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Vérifier le token Supabase
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "❌ SUPABASE_ACCESS_TOKEN est vide ou manquant"
            exit 1
          fi
          echo "✅ Token présent (longueur: ${#SUPABASE_ACCESS_TOKEN})"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          PROJECT_REF="dhbbwzpfwtdtdiuixrmq"

          deploy_fn() {
            local fn="$1"
            local no_jwt="$2"
            echo "🚀 Déploiement de ${fn}..."
            if [ "$no_jwt" = "true" ]; then
              supabase functions deploy "$fn" \
                --project-ref "$PROJECT_REF" \
                --no-verify-jwt 2>&1 || { echo "❌ Échec du déploiement de ${fn}"; exit 1; }
            else
              supabase functions deploy "$fn" \
                --project-ref "$PROJECT_REF" 2>&1 || { echo "❌ Échec du déploiement de ${fn}"; exit 1; }
            fi
            echo "✅ ${fn} déployé avec succès"
          }

          # visitor-counter : sans JWT (appelé depuis le front public)
          deploy_fn visitor-counter true

          # brevo-proxy : sans JWT (appelé depuis le front pour s'inscrire/newsletter)
          deploy_fn brevo-proxy true

          # cal-proxy : sans JWT (calendrier public)
          deploy_fn cal-proxy true

          # stripe-checkout : sans JWT (paiement public)
          deploy_fn stripe-checkout true

          # stripe-webhook : avec JWT (appelé par Stripe, signature vérifiée en interne)
          deploy_fn stripe-webhook false

          # geocode-retroactif : sans JWT (appel manuel unique, utilise service_role en interne)
          deploy_fn geocode-retroactif true

          # cleanup-test-visits : sans JWT (appel manuel unique, utilise service_role en interne)
          deploy_fn cleanup-test-visits true

          echo "✅ Toutes les Edge Functions déployées avec succès"
