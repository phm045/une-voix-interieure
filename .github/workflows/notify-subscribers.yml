name: "📧 Notifier les abonnés"

# Déclenché à chaque push sur main qui modifie index.html
on:
  push:
    branches: [main]
    paths:
      - 'index.html'

jobs:
  detect-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Détecter les modifications et notifier
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          SENDER_EMAIL:  ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME:   "Une Voix Intérieure"
          SITE_URL:      "https://une-voix-interieure.fr/"
          LIST_ID:       "3"
        run: |
          set -euo pipefail

          # ── 1. Détecter les sections modifiées ──────────────────────────
          DIFF=$(git diff HEAD~1 HEAD -- index.html 2>/dev/null || echo "")
          if [ -z "$DIFF" ]; then
            echo "Aucune modification dans index.html"
            exit 0
          fi

          BLOG=false; SERVICES=false; BOUTIQUE=false; THERAPIE=false

          echo "$DIFF" | grep -qiE '(blog-card|data-article|blog-card__title|id="blog")' \
            && BLOG=true || true
          echo "$DIFF" | grep -qiE '(service-card|service-card__price|service-card__title|id="services")' \
            && SERVICES=true || true
          echo "$DIFF" | grep -qiE '(boutique|boutique-product|id="boutique")' \
            && BOUTIQUE=true || true
          echo "$DIFF" | grep -qiE '(therapie|thérapie|id="therapie")' \
            && THERAPIE=true || true

          if ! $BLOG && ! $SERVICES && ! $BOUTIQUE && ! $THERAPIE; then
            echo "Pas de modification dans les sections surveillées"
            exit 0
          fi

          echo "Blog=$BLOG | Services=$SERVICES | Boutique=$BOUTIQUE | Thérapie=$THERAPIE"

          # ── 2. Construire sujet + sections HTML ─────────────────────────
          SUBJECT=""
          BODY_SECTIONS=""

          if $BLOG; then
            NEW_TITLE=$(git diff HEAD~1 HEAD -- index.html \
              | grep "^+" | grep -oP '(?<=blog-card__title">)[^<]+' | head -1 || echo "")
            if [ -n "$NEW_TITLE" ]; then
              SUBJECT="Nouveau sur le blog : ${NEW_TITLE}"
              BODY_SECTIONS="${BODY_SECTIONS}<h2 style=\"color:#8b5e3c;margin-top:28px;\">Nouveau sur le blog</h2><p style=\"font-size:16px;color:#444;\">${NEW_TITLE}</p>"
            else
              SUBJECT="Le blog a été mis à jour"
              BODY_SECTIONS="${BODY_SECTIONS}<h2 style=\"color:#8b5e3c;margin-top:28px;\">Blog mis à jour</h2><p style=\"font-size:16px;color:#444;\">De nouveaux contenus vous attendent.</p>"
            fi
          fi

          if $SERVICES; then
            [ -z "$SUBJECT" ] && SUBJECT="Nouveauté dans les services"
            BODY_SECTIONS="${BODY_SECTIONS}<h2 style=\"color:#8b5e3c;margin-top:28px;\">Services mis à jour</h2><p style=\"font-size:16px;color:#444;\">Les consultations ont été mises à jour.</p>"
          fi

          if $BOUTIQUE; then
            [ -z "$SUBJECT" ] && SUBJECT="Nouveauté dans la boutique"
            BODY_SECTIONS="${BODY_SECTIONS}<h2 style=\"color:#8b5e3c;margin-top:28px;\">Boutique</h2><p style=\"font-size:16px;color:#444;\">La boutique a été mise à jour !</p>"
          fi

          if $THERAPIE; then
            [ -z "$SUBJECT" ] && SUBJECT="Mise à jour thérapeutique"
            BODY_SECTIONS="${BODY_SECTIONS}<h2 style=\"color:#8b5e3c;margin-top:28px;\">Thérapie &amp; Bien-être</h2><p style=\"font-size:16px;color:#444;\">Les soins thérapeutiques ont été mis à jour.</p>"
          fi

          [ -z "$SUBJECT" ] && SUBJECT="Nouveautés sur Une Voix Intérieure"

          # ── 3. Récupérer la liste des abonnés ───────────────────────────
          echo "Récupération des abonnés (liste ${LIST_ID})..."

          CONTACTS_RESP=$(curl -sf \
            "https://api.brevo.com/v3/contacts?listId=${LIST_ID}&limit=100&sort=desc" \
            -H "api-key: ${BREVO_API_KEY}" \
            -H "accept: application/json") || {
            echo "❌ Impossible de récupérer les abonnés"
            exit 1
          }

          TOTAL=$(echo "$CONTACTS_RESP" | jq '.count // 0')
          echo "Abonnés trouvés : ${TOTAL}"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Aucun abonné, rien à envoyer"
            exit 0
          fi

          # ── 4. Construire le HTML de l'email ────────────────────────────
          HTML_BODY=$(cat << HTMLEOF
<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#faf8f5;font-family:Georgia,serif;">
<div style="max-width:600px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
  <div style="background:linear-gradient(135deg,#1a1a2e 0%,#2d1b4e 100%);padding:40px 30px;text-align:center;">
    <h1 style="color:#d4a574;font-size:22px;margin:0;font-weight:300;letter-spacing:3px;">Une Voix Intérieure</h1>
    <p style="color:#c0b0a0;font-size:13px;margin:8px 0 0;">Voyance &amp; Guidance</p>
  </div>
  <div style="padding:32px 30px;">
    <p style="font-size:16px;color:#333;line-height:1.7;">Bonjour,</p>
    <p style="font-size:16px;color:#333;line-height:1.7;">De nouvelles mises à jour vous attendent sur <strong>Une Voix Intérieure</strong>&nbsp;:</p>
    BODY_SECTIONS_PLACEHOLDER
    <div style="text-align:center;margin:36px 0 24px;">
      <a href="SITE_URL_PLACEHOLDER" style="display:inline-block;background:linear-gradient(135deg,#8b5e3c,#d4a574);color:#fff;text-decoration:none;padding:14px 36px;border-radius:8px;font-size:16px;font-weight:600;">Découvrir les nouveautés</a>
    </div>
    <p style="font-size:14px;color:#888;line-height:1.6;">À très bientôt,<br><em>Philippe — Une Voix Intérieure</em></p>
  </div>
  <div style="background:#f5f0eb;padding:18px 30px;text-align:center;border-top:1px solid #e8e0d8;">
    <p style="font-size:12px;color:#999;margin:0;">
      Vous recevez cet email car vous êtes inscrit(e) à la newsletter.<br>
      <a href="{{ unsubscribe }}" style="color:#8b5e3c;">Se désinscrire</a>
    </p>
  </div>
</div>
</body>
</html>
HTMLEOF
)
          # Injecter les sections dynamiques
          HTML_BODY="${HTML_BODY//BODY_SECTIONS_PLACEHOLDER/$BODY_SECTIONS}"
          HTML_BODY="${HTML_BODY//SITE_URL_PLACEHOLDER/$SITE_URL}"

          # ── 5. Envoyer via sendTransacEmail (1 appel par abonné) ────────
          # Plus fiable que createCampaign+sendNow (pas de délai, pas d'état "draft")

          echo "$CONTACTS_RESP" | jq -r '.contacts[] | [.email, (.attributes.PRENOM // "")] | @tsv' \
          | while IFS=$'\t' read -r EMAIL PRENOM; do
            # Personnaliser le prénom
            PERSONAL_HTML="${HTML_BODY//Bonjour,/Bonjour ${PRENOM:-},}"

            PAYLOAD=$(jq -n \
              --arg subject  "$SUBJECT" \
              --arg html     "$PERSONAL_HTML" \
              --arg to_email "$EMAIL" \
              --arg to_name  "${PRENOM:-Abonné(e)}" \
              --arg from_email "$SENDER_EMAIL" \
              --arg from_name  "$SENDER_NAME" \
              '{
                sender:      { name: $from_name, email: $from_email },
                to:          [{ email: $to_email, name: $to_name }],
                subject:     $subject,
                htmlContent: $html
              }')

            RESP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.brevo.com/v3/smtp/email" \
              -H "api-key: ${BREVO_API_KEY}" \
              -H "content-type: application/json" \
              -d "$PAYLOAD")

            if [ "$RESP" -ge 200 ] && [ "$RESP" -lt 300 ]; then
              echo "  ✅ Envoyé à ${EMAIL} (HTTP ${RESP})"
            else
              echo "  ⚠️  Échec pour ${EMAIL} (HTTP ${RESP})"
            fi

            # Respecter le rate limit Brevo (10 req/s)
            sleep 0.15
          done

          echo "✅ Notifications envoyées avec succès"
